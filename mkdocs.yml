site_name: AssessmentBot Documentation
site_description: A tool designed to simplify tracking and assessing the work of hundreds of students
site_author: h-arnold
repo_url: https://github.com/h-arnold/AssessmentBot
repo_name: h-arnold/AssessmentBot

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: README.md
  - Setup:
      - Overview: setup/README.md
      - Configuration Options: setup/configOptions.md
      - Setting Up Assessment Records: setup/settingUpAssessmentRecords.md
      - Setting Up Overview Sheet: setup/settingUpOverviewSheet.md
  - How-Tos:
      - Overview: howTos/README.md
      - Rehydration: howTos/rehydration.md
      - Singletons: developer/backend/singletons.md
  - Developer:
      - Backend:
          - Agent Instructions: developer/backend/AGENT_BACKEND.md
          - API Layer: developer/backend/api-layer.md
          - Assessment Flow: developer/backend/AssessmentFlow.md
          - Data Shapes: developer/backend/DATA_SHAPES.md
          - OAuth Scopes: developer/backend/oauth-scopes.md
          - Rehydration: developer/backend/rehydration.md
          - Singletons: developer/backend/singletons.md
          - Testing: developer/backend/backend-testing.md
          - Vendoring: developer/backend/Vendoring.md
          - Deprecated Legacy UI Audit: developer/backend/DEPRECATED_LEGACY_UI_AUDIT.md
          - Deprecated Legacy Tests Audit: developer/backend/DEPRECATED_LEGACY_TESTS_AUDIT.md
      - Frontend:
          - Agent Instructions: developer/frontend/AGENT_FRONTEND.md
          - Testing: developer/frontend/frontend-testing.md
      - Builder:
          - Agent Instructions: developer/builder/AGENT_BUILDER.md
          - Builder Script: developer/builder/builder-script.md
          - TypeScript and Lint Config Hierarchy: developer/builder/TypeScriptAndLintConfigHierarchy.md
  - Pedagogy:
      - Overview: pedagogy/README.md
  - Release Notes:
      - Releases: releaseNotes/RELEASES.md
      - v0.7.7: releaseNotes/v0.7.7_release_notes.md
      - v0.7.6: releaseNotes/v0.7.6_release_notes.md
      - v0.7.5: releaseNotes/v0.7.5_release_notes.md
      - v0.7.4: releaseNotes/v0.7.4_release_notes.md
      - v0.7.3: releaseNotes/v0.7.3_release_notes.md
      - v0.7.1: releaseNotes/v0.7.1_release_notes.md
      - v0.7.0: releaseNotes/v0.7.0_release_notes.md
      - v0.6.1: releaseNotes/v0.6.1_release_notes.md
      - v0.6.0: releaseNotes/v0.6.0_release_notes.md
