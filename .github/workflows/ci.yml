name: Component Quality CI

on:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'scripts/builder/**'
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'src/frontend/package.json'
      - 'src/frontend/package-lock.json'
      - 'vitest.config.js'
      - 'scripts/builder/vitest.config.ts'
      - 'src/frontend/vite.config.ts'
      - 'tsconfig.base.json'
      - 'config/eslint/ts-base-rules.cjs'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'scripts/builder/**'
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'src/frontend/package.json'
      - 'src/frontend/package-lock.json'
      - 'vitest.config.js'
      - 'scripts/builder/vitest.config.ts'
      - 'src/frontend/vite.config.ts'
      - 'tsconfig.base.json'
      - 'config/eslint/ts-base-rules.cjs'
  workflow_dispatch:

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix src/frontend ci

      - name: Run frontend tests
        run: npm run frontend:test

      - name: Run frontend coverage gate
        run: npm run frontend:test:coverage

  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  builder-checks:
    name: Builder checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix src/frontend ci
      - name: Run builder lint, tests and pipeline
        run: npm run builder:ci

      - name: Upload GAS build artefact
        uses: actions/upload-artifact@v4
        with:
          name: gas-build
          path: build/gas/
          if-no-files-found: error
