<!doctype html>
<html lang="en">
  <head>
    <?!= include('UI/partials/Head') ?>
    <title>Assessment wizard</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .wizard-content {
        padding: 1rem;
        flex: 1;
      }

      .wizard-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        padding: 0 1rem 1rem;
      }

      .assignment-menu {
        max-height: 18rem;
        overflow-y: auto;
        width: 100%;
      }

      .assignment-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
      }

      .assignment-name {
        flex: 1;
      }

      .assignment-icons {
        display: inline-flex;
        gap: 0.25rem;
      }

      .assignment-icons i {
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div class="beer">
      <main class="wizard-content">
        <header>
          <p class="muted">
            Choose the Classroom assignment you want to assess before moving on to the document
            inputs.
          </p>
        </header>

        <fieldset class="field-group">
          <legend>Assignment</legend>
          <div class="field label suffix border">
            <input
              id="assignmentInput"
              type="text"
              autocomplete="off"
              disabled
              data-ui="#assignmentMenu"
              placeholder="Loading assignments..."
            />
            <label for="assignmentInput">Assignment</label>
            <progress
              id="assignmentLoadingSpinner"
              class="circle indeterminate"
              aria-hidden="false"
            ></progress>
            <menu id="assignmentMenu" class="assignment-menu">
              <li class="assignment-row muted">Loading assignments...</li>
            </menu>
          </div>
          <output
            id="assignmentErrorMessage"
            class="status danger"
            aria-live="polite"
            hidden
          ></output>
        </fieldset>
      </main>

      <footer class="wizard-actions">
        <nav class="group connected">
          <button class="button border left-round" type="button" id="cancelWizard">Cancel</button>
          <button
            class="button border right-round primary"
            type="button"
            id="startAssessment"
            disabled
          >
            Start assessment
          </button>
        </nav>
      </footer>
    </div>

    <script>
      (() => {
        const assignmentInput = document.getElementById('assignmentInput');
        const assignmentMenu = document.getElementById('assignmentMenu');
        const spinner = document.getElementById('assignmentLoadingSpinner');
        const startButton = document.getElementById('startAssessment');
        const cancelButton = document.getElementById('cancelWizard');
        const errorMessage = document.getElementById('assignmentErrorMessage');

        const assignmentWizard = {
          initialised: false,
          state: {
            assignments: [],
            selectedAssignmentId: '',
            filterValue: '',
            // will hold partial definitions returned from server
            definitions: [],
          },
          init() {
            if (this.initialised) return;
            this.initialised = true;
            this.bindEvents();
            this.prepareForLoad('Loading assignments...');
            // Kick off both GAS calls asynchronously on the next tick so neither can block
            setTimeout(() => this.fetchAssignments(), 0);
            setTimeout(() => this.fetchPartialDefinitions(), 0);
          },
          bindEvents() {
            assignmentInput.addEventListener('input', () => this.handleFilterInput());
            assignmentMenu.addEventListener('click', (event) => this.handleMenuSelection(event));
            cancelButton.addEventListener('click', () => this.handleCancel());
            startButton.addEventListener('click', () => this.handleStart());
          },

          prepareForLoad(placeholder) {
            this.setControlsEnabled(false);
            this.renderPlaceholder(placeholder);
            this.hideError();
            this.setSpinnerVisible(true);
          },
          fetchAssignments() {
            google.script.run
              .withSuccessHandler((payload) => this.handleAssignmentsSuccess(payload))
              .withFailureHandler((error) => this.handleAssignmentsFailure(error))
              .fetchAssignmentsForWizard();
          },
          renderPlaceholder(text) {
            this.state.filterValue = '';
            assignmentInput.value = '';
            assignmentInput.setAttribute('placeholder', text);
            assignmentMenu.innerHTML = '';
            const placeholderItem = document.createElement('li');
            placeholderItem.className = 'assignment-row muted';
            placeholderItem.textContent = text;
            assignmentMenu.appendChild(placeholderItem);
          },
          handleAssignmentsSuccess(assignments) {
            this.state.assignments = Array.isArray(assignments) ? assignments : [];
            this.setSpinnerVisible(false);

            if (this.state.assignments.length === 0) {
              this.setControlsEnabled(false);
              this.renderPlaceholder('No assignments available yet');
              this.showError('No assignments were found for this classroom.');
              return;
            }

            this.hideError();
            this.renderPlaceholder('Select an assignment...');
            this.renderAssignmentMenuItems();
            this.setControlsEnabled(true);
            this.handleSelectionChange();
          },
          handleAssignmentsFailure(error) {
            this.state.assignments = [];
            this.setSpinnerVisible(false);
            this.renderPlaceholder('Unable to load assignments');
            this.setControlsEnabled(false);
            this.showError(
              error?.message
                ? `Failed to load assignments: ${error.message}`
                : 'Failed to load assignments.'
            );
          },

          // Fetch partial definitions to support wizard lookups (stored only for now)
          fetchPartialDefinitions() {
            google.script.run
              .withSuccessHandler((payload) => this.handlePartialDefinitionsSuccess(payload))
              .withFailureHandler((error) => this.handlePartialDefinitionsFailure(error))
              .getAllPartialDefinitions();
          },

          handlePartialDefinitionsSuccess(definitions) {
            this.state.definitions = Array.isArray(definitions) ? definitions : [];
            this.renderAssignmentMenuItems();
          },

          /**
           * Attempt to find a matching partial definition for the provided assignment.
           * Matching rules (client-side):
           * - primaryTopic must equal assignment.topicName
           * - yearGroup must match (null treated as null)
           * - title matches either primaryTitle or any of alternateTitles (case-insensitive, trimmed)
           * If found, render definition panel; otherwise hide it.
           */
          findMatchingDefinition(assignment) {
            if (!assignment || !this.state.definitions.length) {
              return null;
            }

            const normTitle = (s) => (s || '').toString().trim().toLowerCase();
            const assignmentTitle = normTitle(assignment.title);
            const assignmentTopic = (assignment.topicName || '').toString();
            const assignmentYear = assignment.yearGroup === undefined ? null : assignment.yearGroup;

            return (
              this.state.definitions.find((def) => {
                if (!def) return false;
                if ((def.primaryTopic || '') !== assignmentTopic) return false;

                const defYear = def.yearGroup === undefined ? null : def.yearGroup;
                // Loose equality for null handling
                if (defYear !== assignmentYear) return false;

                if (normTitle(def.primaryTitle) === assignmentTitle) return true;
                if (Array.isArray(def.alternateTitles)) {
                  if (def.alternateTitles.map((t) => normTitle(t)).includes(assignmentTitle))
                    return true;
                }
                return false;
              }) || null
            );
          },

          matchDefinitionForAssignment(assignment) {
            this.state.matchedDefinition = null;
            if (!assignment) {
              return null;
            }

            if (!this.state.definitions.length) {
              // Definitions not yet loaded - do not hide primary actions (non-blocking lookup)
              return null;
            }

            const match = this.findMatchingDefinition(assignment);

            if (match) {
              this.state.matchedDefinition = match;

              // Fast-path: if both doc IDs exist, immediately start the assessment and close the wizard.
              const hasDocs = !!match.referenceDocumentId && !!match.templateDocumentId;
              if (hasDocs) {
                startButton.disabled = true;
                this.setSpinnerVisible(true);

                google.script.run
                  .withSuccessHandler(() => {
                    google.script.run.showProgressModal();
                    google.script.host.close();
                  })
                  .withFailureHandler((error) => {
                    startButton.disabled = false;
                    this.setSpinnerVisible(false);
                    this.showError(
                      error?.message
                        ? `Failed to start: ${error.message}`
                        : 'Failed to start assessment.'
                    );
                  })
                  .startAssessmentFromWizard(this.state.selectedAssignmentId, match.definitionKey);
              }
            } else {
              this.state.matchedDefinition = null;
            }

            return match;
          },

          getDefinitionStatusForAssignment(assignment) {
            if (!assignment) return { state: 'unknown', hasDocs: false };
            if (!this.state.definitions.length) {
              return { state: 'loading', hasDocs: false };
            }

            const match = this.findMatchingDefinition(assignment);
            if (match && match.referenceDocumentId && match.templateDocumentId) {
              return { state: 'linked', hasDocs: true };
            }

            return { state: 'missing', hasDocs: false };
          },

          renderAssignmentMenuItems() {
            if (!this.state.assignments.length) {
              return;
            }

            const filter = (this.state.filterValue || '').toString().trim().toLowerCase();
            assignmentMenu.innerHTML = '';

            const filteredAssignments = this.state.assignments.filter((assignment) => {
              const title = (assignment.title || '').toString().toLowerCase();
              return !filter || title.includes(filter);
            });

            if (!filteredAssignments.length) {
              const emptyItem = document.createElement('li');
              emptyItem.className = 'assignment-row muted';
              emptyItem.textContent = 'No assignments match your search.';
              assignmentMenu.appendChild(emptyItem);
              return;
            }

            filteredAssignments.forEach((assignment) => {
              const status = this.getDefinitionStatusForAssignment(assignment);
              const item = document.createElement('li');
              item.dataset.assignmentId = assignment.id;
              item.className = 'assignment-row';
              if (assignment.id === this.state.selectedAssignmentId) {
                item.classList.add('active');
              }

              const name = document.createElement('span');
              name.className = 'assignment-name';
              name.textContent = assignment.title || 'Untitled assignment';

              const icons = document.createElement('span');
              icons.className = 'assignment-icons';

              if (status.state === 'linked') {
                const checkIcon = document.createElement('i');
                checkIcon.className = 'green-text';
                checkIcon.textContent = 'check_circle';
                checkIcon.title = 'Assignment definition found';

                const editIcon = document.createElement('i');
                editIcon.className = 'secondary-text';
                editIcon.textContent = 'edit';
                editIcon.title = 'Edit assignment definition';

                icons.appendChild(checkIcon);
                icons.appendChild(editIcon);
              } else if (status.state === 'loading') {
                const pendingIcon = document.createElement('i');
                pendingIcon.className = 'muted';
                pendingIcon.textContent = 'hourglass_empty';
                pendingIcon.title = 'Checking definitions';
                icons.appendChild(pendingIcon);
              } else {
                const linkIcon = document.createElement('i');
                linkIcon.className = 'primary-text';
                linkIcon.textContent = 'link';
                linkIcon.title = 'Link existing definition';

                const addIcon = document.createElement('i');
                addIcon.className = 'primary-text';
                addIcon.textContent = 'add_circle';
                addIcon.title = 'Create new definition';

                icons.appendChild(linkIcon);
                icons.appendChild(addIcon);
              }

              item.appendChild(name);
              item.appendChild(icons);
              assignmentMenu.appendChild(item);
            });
          },

          handleFilterInput() {
            this.state.filterValue = assignmentInput.value || '';
            this.state.selectedAssignmentId = '';
            this.state.matchedDefinition = null;
            startButton.disabled = true;
            this.renderAssignmentMenuItems();
          },

          handleMenuSelection(event) {
            const item = event.target.closest('li[data-assignment-id]');
            if (!item) return;

            const assignmentId = item.dataset.assignmentId;
            const assignment = this.state.assignments.find((a) => a.id === assignmentId);
            if (!assignment) return;

            assignmentInput.value = assignment.title || 'Untitled assignment';
            this.state.filterValue = '';
            this.state.selectedAssignmentId = assignmentId;
            this.handleSelectionChange();
          },

          handleStart() {
            // Fast-path: if matchedDefinition is present, start using it; else do nothing for now
            if (!this.state.selectedAssignmentId) return;
            const def = this.state.matchedDefinition;
            if (!def) {
              this.showError('No definition selected. Please link or create one.');
              return;
            }

            // Basic pre-validation
            if (!def.definitionKey) {
              this.showError('Selected definition is invalid. Missing definition key.');
              return;
            }

            startButton.disabled = true;
            this.setSpinnerVisible(true);

            // Call server to start using the existing definition
            google.script.run
              .withSuccessHandler((processId) => {
                // Show progress modal and close wizard
                google.script.run.showProgressModal();
                google.script.host.close();
              })
              .withFailureHandler((error) => {
                startButton.disabled = false;
                this.setSpinnerVisible(false);
                this.showError(
                  error?.message
                    ? `Failed to start: ${error.message}`
                    : 'Failed to start assessment.'
                );
              })
              .startAssessmentFromWizard(this.state.selectedAssignmentId, def.definitionKey);
          },

          handlePartialDefinitionsFailure(error) {
            // For now just keep an empty set and log the problem to the console.
            this.state.definitions = [];
            // eslint-disable-next-line no-console
            console.warn('Failed to load partial definitions for wizard:', error);
          },
          handleSelectionChange() {
            // Keep existing behaviour: primary button is enabled when an assignment is selected
            startButton.disabled = !this.state.selectedAssignmentId;

            // Attempt to match a definition for the selected assignment (non-blocking)
            if (this.state.selectedAssignmentId) {
              const assignment = this.state.assignments.find(
                (a) => a.id === this.state.selectedAssignmentId
              );
              this.matchDefinitionForAssignment(assignment);
              this.renderAssignmentMenuItems();
            } else {
              this.state.matchedDefinition = null;
            }
          },
          handleCancel() {
            google.script.host.close();
          },
          setSpinnerVisible(visible) {
            spinner.hidden = !visible;
            spinner.setAttribute('aria-hidden', visible ? 'false' : 'true');
          },
          setControlsEnabled(enabled) {
            assignmentInput.disabled = !enabled;
            startButton.disabled = !enabled;
          },
          showError(message) {
            errorMessage.textContent = message;
            errorMessage.hidden = false;
          },
          hideError() {
            errorMessage.hidden = true;
            errorMessage.textContent = '';
          },
        };

        globalThis.assignmentWizard = assignmentWizard;

        const kickOff = () => assignmentWizard.init();
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', kickOff);
        } else {
          kickOff();
        }
      })();
    </script>
  </body>
</html>
