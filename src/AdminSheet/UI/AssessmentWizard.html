<!doctype html>
<html lang="en">
  <head>
    <?!= include('UI/partials/Head') ?>
    <title>Assessment wizard</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .wizard-content {
        padding: 1rem;
        flex: 1;
      }

      .beer .wizard-content {
        overflow: visible !important;
      }

      .wizard-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        padding: 0 1rem 1rem;
        position: relative;
        z-index: 1;
      }

      .assignment-menu {
        max-height: 18rem;
        overflow-y: auto;
        overflow-x: visible;
        width: 100%;
        z-index: 20;
      }

      .assignment-menu > li {
        min-block-size: 2.5rem;
        padding: 0.3rem 0.75rem;
      }

      .assignment-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
      }

      .assignment-name {
        flex: 1;
      }

      .assignment-icons {
        display: inline-flex;
        gap: 0.25rem;
      }

      .assignment-icons .icon-tooltip {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .assignment-icons .tooltip {
        z-index: 60;
        position: absolute;
        top: -2.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--inverse-surface);
        color: var(--inverse-on-surface);
        padding: 0.35rem 0.6rem;
        border-radius: 0.25rem;
        font-size: 0.75rem;
        white-space: nowrap;
        visibility: hidden;
        opacity: 0;
        transition:
          opacity 0.12s ease,
          visibility 0.12s ease;
        pointer-events: none;
      }

      .icon-tooltip:hover .tooltip {
        visibility: visible;
        opacity: 1;
      }

      .field-group.no-border {
        border: none;
        padding: 0;
      }

      .assignment-icons i {
        font-size: 1.1rem;
      }

      /* Step 2 document inputs: make room for an icon to the right of the input */
      #step2Panel .field.label.border {
        position: relative;
      }

      /* Rely on BeerCSS suffix handling for input padding and icon spacing */

      /* Use BeerCSS default label underline behaviour */

      /* Success underline for validated fields (use composite .field-success to simplify JS) */
      #step2Panel .field.field-success.label > label::after {
        border-block-start-color: #4caf50;
        color: #4caf50;
      }
      /* Ensure the entire control (container + input) shows the green success border and focus state */
      #step2Panel .field.field-success,
      #step2Panel .field.field-success > :is(input, textarea, select) {
        border-color: #4caf50 !important;
      }

      #step2Panel .field.field-success > :is(input, textarea, select):focus {
        border-color: #4caf50 !important;
        outline-color: #4caf50 !important;
      }
      #step2Panel .field.field-success label,
      #step2Panel .field.field-success i {
        color: #4caf50 !important;
      }
      /* Use BeerCSS icon positioning and sizing for .field.suffix */
    </style>
  </head>
  <body>
    <div class="beer">
      <main class="wizard-content">
        <header>
          <p id="assignmentHelp" class="muted">
            Choose the Classroom assignment you want to assess.
          </p>
        </header>

        <fieldset id="step1Panel" class="field-group no-border">
          <div class="field label suffix border">
            <input
              id="assignmentInput"
              type="text"
              autocomplete="off"
              disabled
              data-ui="#assignmentMenu"
              placeholder="Loading assignments..."
            />
            <label for="assignmentInput" class="active">Assignment</label>
            <progress
              id="assignmentLoadingSpinner"
              class="circle indeterminate"
              aria-hidden="false"
            ></progress>
            <menu id="assignmentMenu" class="assignment-menu">
              <li class="assignment-row muted">Loading assignments...</li>
            </menu>
          </div>
          <output
            id="assignmentErrorMessage"
            class="status danger"
            aria-live="polite"
            hidden
          ></output>
        </fieldset>

        <fieldset id="step2Panel" class="field-group no-border" hidden>
          <legend>Provide documents for this assignment</legend>
          <p class="muted">
            Paste the URLs of the reference and template documents. We will validate the document
            type and check the URLs are different before creating the assignment.
          </p>

          <div class="field label border suffix">
            <input
              id="referenceInputStep2"
              type="text"
              autocomplete="off"
              placeholder="Reference document URL"
            />
            <label for="referenceInputStep2">Reference document</label>
            <i id="referenceIcon"></i>
            <output id="referenceFeedback" class="status" aria-live="polite" hidden></output>
          </div>

          <div class="field label border suffix">
            <input
              id="templateInputStep2"
              type="text"
              autocomplete="off"
              placeholder="Template document URL"
            />
            <label for="templateInputStep2">Template document</label>
            <i id="templateIcon"></i>
            <output id="templateFeedback" class="status" aria-live="polite" hidden></output>
          </div>

          <output id="step2ErrorMessage" class="status danger" aria-live="polite" hidden></output>
        </fieldset>
      </main>

      <footer class="wizard-actions">
        <nav class="group connected">
          <button class="button border left-round" type="button" id="backToStep1" hidden>
            Back
          </button>
          <button class="button border left-round" type="button" id="cancelWizard">Cancel</button>
          <button
            class="button border right-round primary"
            type="button"
            id="startAssessment"
            disabled
          >
            Start assessment
          </button>
        </nav>
      </footer>
    </div>

    <script>
      (() => {
        const assignmentInput = document.getElementById('assignmentInput');
        const assignmentMenu = document.getElementById('assignmentMenu');
        const spinner = document.getElementById('assignmentLoadingSpinner');
        const startButton = document.getElementById('startAssessment');
        const cancelButton = document.getElementById('cancelWizard');
        const errorMessage = document.getElementById('assignmentErrorMessage');

        // Step 2 elements
        const step1Panel = document.getElementById('step1Panel');
        const step2Panel = document.getElementById('step2Panel');
        const referenceInput = document.getElementById('referenceInputStep2');
        const templateInput = document.getElementById('templateInputStep2');
        const referenceIcon = document.getElementById('referenceIcon');
        const templateIcon = document.getElementById('templateIcon');
        const referenceFeedback = document.getElementById('referenceFeedback');
        const templateFeedback = document.getElementById('templateFeedback');
        const backButton = document.getElementById('backToStep1');
        const step2ErrorMessage = document.getElementById('step2ErrorMessage');
        const assignmentHelp = document.getElementById('assignmentHelp');

        const assignmentWizard = {
          initialised: false,
          state: {
            assignments: [],
            selectedAssignmentId: '',
            filterValue: '',
            // will hold partial definitions returned from server
            definitions: [],
            definitionsLoaded: false,
            isStarting: false,
          },
          init() {
            if (this.initialised) return;
            this.initialised = true;
            this.bindEvents();
            this.prepareForLoad('Loading assignments...');
            // Kick off both GAS calls asynchronously on the next tick so neither can block
            setTimeout(() => this.fetchAssignments(), 0);
            setTimeout(() => this.fetchPartialDefinitions(), 0);
          },
          bindEvents() {
            assignmentInput.addEventListener('input', () => this.handleFilterInput());
            assignmentMenu.addEventListener('click', (event) => this.handleMenuSelection(event));
            cancelButton.addEventListener('click', () => this.handleCancel());
            startButton.addEventListener('click', () => this.handleStart());

            // Step 2 listeners
            referenceInput.addEventListener('input', (e) =>
              this.handleDocumentInput('reference', e.target.value)
            );
            templateInput.addEventListener('input', (e) =>
              this.handleDocumentInput('template', e.target.value)
            );
            backButton.addEventListener('click', () => this.showStep('selectAssignment'));
          },

          prepareForLoad(placeholder) {
            this.setControlsEnabled(false);
            this.renderPlaceholder(placeholder);
            this.hideError();
            this.setSpinnerVisible(true);
          },
          fetchAssignments() {
            google.script.run
              .withSuccessHandler((payload) => this.handleAssignmentsSuccess(payload))
              .withFailureHandler((error) => this.handleAssignmentsFailure(error))
              .fetchAssignmentsForWizard();
          },
          renderPlaceholder(text) {
            this.state.filterValue = '';
            assignmentInput.value = '';
            assignmentInput.setAttribute('placeholder', text);
            assignmentMenu.innerHTML = '';
            const placeholderItem = document.createElement('li');
            placeholderItem.className = 'assignment-row muted';
            placeholderItem.textContent = text;
            assignmentMenu.appendChild(placeholderItem);
          },
          handleAssignmentsSuccess(assignments) {
            this.state.assignments = Array.isArray(assignments) ? assignments : [];
            this.setSpinnerVisible(false);

            if (this.state.assignments.length === 0) {
              this.setControlsEnabled(false);
              this.renderPlaceholder('No assignments available yet');
              this.showError('No assignments were found for this classroom.');
              return;
            }

            this.hideError();
            this.renderPlaceholder('Select an assignment...');
            this.renderAssignmentMenuItems();
            this.setControlsEnabled(true);
            this.handleSelectionChange();
          },
          handleAssignmentsFailure(error) {
            this.state.assignments = [];
            this.setSpinnerVisible(false);
            this.renderPlaceholder('Unable to load assignments');
            this.setControlsEnabled(false);
            this.showError(
              error?.message
                ? `Failed to load assignments: ${error.message}`
                : 'Failed to load assignments.'
            );
          },

          // Fetch partial definitions to support wizard lookups (stored only for now)
          fetchPartialDefinitions() {
            google.script.run
              .withSuccessHandler((payload) => this.handlePartialDefinitionsSuccess(payload))
              .withFailureHandler((error) => this.handlePartialDefinitionsFailure(error))
              .getAllPartialDefinitions();
          },

          handlePartialDefinitionsSuccess(definitions) {
            this.state.definitions = Array.isArray(definitions) ? definitions : [];
            this.state.definitionsLoaded = true;
            this.renderAssignmentMenuItems();
          },

          /**
           * Attempt to find a matching partial definition for the provided assignment.
           * Matching rules (client-side):
           * - primaryTopic must equal assignment.topicName
           * - yearGroup must match (null treated as null)
           * - title matches either primaryTitle or any of alternateTitles (case-insensitive, trimmed)
           * If found, render definition panel; otherwise hide it.
           */
          findMatchingDefinition(assignment) {
            if (!assignment || !this.state.definitions.length) {
              return null;
            }

            const normTitle = (s) => (s || '').toString().trim().toLowerCase();
            const assignmentTitle = normTitle(assignment.title);
            const assignmentTopic = (assignment.topicName || '').toString();
            const assignmentYear = assignment.yearGroup === undefined ? null : assignment.yearGroup;

            return (
              this.state.definitions.find((def) => {
                if (!def) return false;
                if ((def.primaryTopic || '') !== assignmentTopic) return false;

                const defYear = def.yearGroup === undefined ? null : def.yearGroup;
                // Loose equality for null handling
                if (defYear !== assignmentYear) return false;

                if (normTitle(def.primaryTitle) === assignmentTitle) return true;
                if (Array.isArray(def.alternateTitles)) {
                  if (def.alternateTitles.map((t) => normTitle(t)).includes(assignmentTitle))
                    return true;
                }
                return false;
              }) || null
            );
          },

          matchDefinitionForAssignment(assignment) {
            this.state.matchedDefinition = null;
            if (!assignment) {
              return null;
            }

            if (!this.state.definitions.length) {
              // Definitions not yet loaded - do not hide primary actions (non-blocking lookup)
              return null;
            }

            const match = this.findMatchingDefinition(assignment);

            if (match) {
              this.state.matchedDefinition = match;

              // Fast-path: if both doc IDs exist, immediately start the assessment and close the wizard.
              const hasDocs = !!match.referenceDocumentId && !!match.templateDocumentId;
              if (hasDocs) {
                this.state.isStarting = true;
                startButton.disabled = true;
                this.setSpinnerVisible(true);

                google.script.run
                  .withSuccessHandler(() => {
                    google.script.run.showProgressModal();
                    google.script.host.close();
                  })
                  .withFailureHandler((error) => {
                    this.state.isStarting = false;
                    startButton.disabled = false;
                    this.setSpinnerVisible(false);
                    this.showError(
                      error?.message
                        ? `Failed to start: ${error.message}`
                        : 'Failed to start assessment.'
                    );
                    this.updateStartButtonState();
                  })
                  .startAssessmentFromWizard(this.state.selectedAssignmentId, match.definitionKey);
              }
            } else {
              this.state.matchedDefinition = null;
            }

            return match;
          },

          getDefinitionStatusForAssignment(assignment) {
            if (!assignment) return { state: 'unknown', hasDocs: false };
            if (!this.state.definitionsLoaded) {
              return { state: 'loading', hasDocs: false };
            }

            const match = this.findMatchingDefinition(assignment);
            if (match && match.referenceDocumentId && match.templateDocumentId) {
              return { state: 'linked', hasDocs: true };
            }

            return { state: 'missing', hasDocs: false };
          },

          renderAssignmentMenuItems() {
            if (!this.state.assignments.length) {
              return;
            }

            const filter = (this.state.filterValue || '').toString().trim().toLowerCase();
            assignmentMenu.innerHTML = '';

            const filteredAssignments = this.state.assignments.filter((assignment) => {
              const title = (assignment.title || '').toString().toLowerCase();
              return !filter || title.includes(filter);
            });

            if (!filteredAssignments.length) {
              const emptyItem = document.createElement('li');
              emptyItem.className = 'assignment-row muted';
              emptyItem.textContent = 'No assignments match your search.';
              assignmentMenu.appendChild(emptyItem);
              return;
            }

            filteredAssignments.forEach((assignment) => {
              const status = this.getDefinitionStatusForAssignment(assignment);
              const item = document.createElement('li');
              item.dataset.assignmentId = assignment.id;
              item.className = 'assignment-row';
              if (assignment.id === this.state.selectedAssignmentId) {
                item.classList.add('active');
              }

              const name = document.createElement('span');
              name.className = 'assignment-name';
              name.textContent = assignment.title || 'Untitled assignment';

              const icons = document.createElement('span');
              icons.className = 'assignment-icons';

              if (status.state === 'linked') {
                const checkIcon = document.createElement('i');
                checkIcon.className = 'green-text';
                checkIcon.textContent = 'check_circle';
                checkIcon.title = 'Assignment definition found';

                const editWrap = document.createElement('span');
                editWrap.className = 'icon-tooltip';

                const editIcon = document.createElement('i');
                editIcon.className = 'secondary-text';
                editIcon.textContent = 'edit';

                const editTooltip = document.createElement('span');
                editTooltip.className = 'tooltip';
                editTooltip.textContent = 'Edit assignment definition';

                editWrap.appendChild(editIcon);
                editWrap.appendChild(editTooltip);

                icons.appendChild(checkIcon);
                icons.appendChild(editWrap);
              } else if (status.state === 'loading') {
                const pendingIcon = document.createElement('i');
                pendingIcon.className = 'muted';
                pendingIcon.textContent = 'hourglass_empty';
                pendingIcon.title = 'Checking definitions';
                icons.appendChild(pendingIcon);
              } else {
                const linkWrap = document.createElement('span');
                linkWrap.className = 'icon-tooltip';

                const linkIcon = document.createElement('i');
                linkIcon.className = 'primary-text';
                linkIcon.textContent = 'link';

                const linkTooltip = document.createElement('span');
                linkTooltip.className = 'tooltip';
                linkTooltip.textContent = 'Link to existing assignment';

                linkWrap.appendChild(linkIcon);
                linkWrap.appendChild(linkTooltip);

                const addWrap = document.createElement('span');
                addWrap.className = 'icon-tooltip';
                addWrap.dataset.action = 'create-definition';
                addWrap.dataset.assignmentId = assignment.id;

                const addIcon = document.createElement('i');
                addIcon.className = 'primary-text';
                addIcon.textContent = 'add_circle';
                addIcon.tabIndex = 0;

                const addTooltip = document.createElement('span');
                addTooltip.className = 'tooltip';
                addTooltip.textContent = 'Create new assignment';

                addWrap.appendChild(addIcon);
                addWrap.appendChild(addTooltip);

                icons.appendChild(linkWrap);
                icons.appendChild(addWrap);
              }

              item.appendChild(name);
              item.appendChild(icons);
              assignmentMenu.appendChild(item);
            });
          },

          handleFilterInput() {
            this.state.filterValue = assignmentInput.value || '';
            this.state.selectedAssignmentId = '';
            this.state.matchedDefinition = null;
            this.state.isStarting = false;
            this.updateStartButtonState();
            this.renderAssignmentMenuItems();
          },

          handleMenuSelection(event) {
            // If the click was on an action (create definition), handle that first
            const action = event.target.closest('[data-action="create-definition"]');
            if (action) {
              const id = action.dataset.assignmentId;
              const assignment = this.state.assignments.find((a) => a.id === id);
              if (assignment) return this.openCreateAssignmentPanel(assignment);
              return;
            }

            const item = event.target.closest('li[data-assignment-id]');
            if (!item) return;

            const assignmentId = item.dataset.assignmentId;
            const assignment = this.state.assignments.find((a) => a.id === assignmentId);
            if (!assignment) return;

            assignmentInput.value = assignment.title || 'Untitled assignment';
            this.state.filterValue = '';
            this.state.selectedAssignmentId = assignmentId;
            this.handleSelectionChange();
          },

          handleStart() {
            if (this.state.step === 'enterDocuments') {
              // Step 2: client-side validation only. Do not call backend at this stage.
              if (!this.state.selectedAssignmentId) return;
              if (!this.hasValidDocumentInputs()) {
                step2ErrorMessage.textContent = 'Please provide two different valid document URLs.';
                step2ErrorMessage.hidden = false;
                return;
              }

              if (!this.state.documentsValidated) {
                // First click: validate and move to 'ready' state locally
                this.state.documentsValidated = true;
                step2ErrorMessage.classList.remove('danger');
                step2ErrorMessage.hidden = false;
                step2ErrorMessage.textContent =
                  'Documents validated. Click Start assessment to begin.';
                startButton.textContent = 'Start assessment';
                this.updateStartButtonState();
                return;
              }

              // Documents already validated: backend action not implemented yet
              step2ErrorMessage.classList.remove('danger');
              step2ErrorMessage.hidden = false;
              step2ErrorMessage.textContent = 'Start action is not yet implemented.';
              return;
            }

            // Fast-path: if matchedDefinition is present, start using it; else do nothing for now
            if (!this.state.selectedAssignmentId) return;
            const def = this.state.matchedDefinition;
            if (!def || !this.hasMatchedDefinitionWithDocs()) {
              this.showError('No definition selected. Please link or create one.');
              return;
            }

            // Basic pre-validation
            if (!def.definitionKey) {
              this.showError('Selected definition is invalid. Missing definition key.');
              return;
            }

            this.state.isStarting = true;
            this.updateStartButtonState();
            this.setSpinnerVisible(true);

            // Call server to start using the existing definition
            google.script.run
              .withSuccessHandler((processId) => {
                // Show progress modal and close wizard
                google.script.run.showProgressModal();
                google.script.host.close();
              })
              .withFailureHandler((error) => {
                this.state.isStarting = false;
                this.updateStartButtonState();
                this.setSpinnerVisible(false);
                this.showError(
                  error?.message
                    ? `Failed to start: ${error.message}`
                    : 'Failed to start assessment.'
                );
              })
              .startAssessmentFromWizard(this.state.selectedAssignmentId, def.definitionKey);
          },

          handlePartialDefinitionsFailure(error) {
            // For now just keep an empty set and log the problem to the console.
            this.state.definitions = [];
            this.state.definitionsLoaded = true;
            // eslint-disable-next-line no-console
            console.warn('Failed to load partial definitions for wizard:', error);
          },
          handleSelectionChange() {
            // Attempt to match a definition for the selected assignment (non-blocking)
            if (this.state.selectedAssignmentId) {
              const assignment = this.state.assignments.find(
                (a) => a.id === this.state.selectedAssignmentId
              );
              this.matchDefinitionForAssignment(assignment);
              this.renderAssignmentMenuItems();
            } else {
              this.state.matchedDefinition = null;
            }

            this.updateStartButtonState();
          },

          showStep(step) {
            this.state.step = step;
            step1Panel.hidden = step !== 'selectAssignment';
            step2Panel.hidden = step !== 'enterDocuments';
            backButton.hidden = step !== 'enterDocuments';
            // Hide the top helper paragraph when entering Step 2 (it's step 1 specific)
            if (assignmentHelp) assignmentHelp.hidden = step !== 'selectAssignment';
            // set primary button label
            startButton.textContent = step === 'enterDocuments' ? 'Next' : 'Start assessment';
            // Clear any step2 errors when switching
            step2ErrorMessage.hidden = true;
            step2ErrorMessage.textContent = '';
          },

          openCreateAssignmentPanel(assignment) {
            // Prepare Step 2 state and UI for creating a new assignment definition
            this.state.selectedAssignmentId = assignment.id;
            this.state.selectedAssignmentName = assignment.title || 'Untitled assignment';
            this.state.documents = {
              reference: { raw: '', id: null, inferredType: null },
              template: { raw: '', id: null, inferredType: null },
            };

            referenceInput.value = '';
            templateInput.value = '';
            this.setFieldValidState('reference', null, null);
            this.setFieldValidState('template', null, null);
            this.showStep('enterDocuments');
            referenceInput.focus();
            this.updateStartButtonState();
          },

          // Infer the document type only. We no longer attempt to extract or validate an ID.
          // Returns: { raw, inferredType }
          parseGoogleUrl(input) {
            const trimmed = (input || '').toString().trim();
            if (!trimmed) return { raw: '', inferredType: 'unknown' };

            // Simple detection by URL shape - don't attempt to extract IDs or enforce length checks
            if (/\/presentation\//i.test(trimmed) || /slide(s)?/i.test(trimmed)) {
              return { raw: trimmed, inferredType: 'SLIDES' };
            }
            if (/\/spreadsheets\//i.test(trimmed) || /sheet(s)?/i.test(trimmed)) {
              return { raw: trimmed, inferredType: 'SHEETS' };
            }
            if (/\/document\//i.test(trimmed) || /doc(s)?/i.test(trimmed)) {
              return { raw: trimmed, inferredType: 'DOCS' };
            }

            // Not a recognised document type
            return { raw: trimmed, inferredType: 'unknown' };
          },

          // Normalise pasted values for a forgiving equality check (strip trailing edit fragments and query strings)
          normaliseForComparison(raw) {
            if (!raw) return '';
            let s = raw.toString().trim();
            // Remove querystring and fragments
            s = s.replace(/[?#].*$/, '');
            // Remove common trailing edit paths like /edit or /edit#slide=id
            // Avoid matching empty strings inside the optional group by requiring the
            // fragment/query delimiter when present (prevents redundant `(?:.*)?` patterns)
            s = s.replace(/\/edit(?:[#?].*)?$/, '');
            // Trim trailing slashes
            s = s.replace(/\/+$/, '');
            return s;
          },

          handleDocumentInput(fieldKey, rawValue) {
            const parsed = this.parseGoogleUrl(rawValue);
            this.state.documents = this.state.documents || { reference: {}, template: {} };
            this.state.documents[fieldKey] = {
              raw: rawValue,
              inferredType: parsed.inferredType,
            };

            // Consider a field valid if we detected a document type (not 'unknown') and there is some input
            this.setFieldValidState(
              fieldKey,
              parsed.inferredType !== 'unknown',
              parsed.inferredType
            );
            // Check for cross-field conflicts (both values present and equal)
            this.validateDocumentPair();
            this.updateStartButtonState();
          },

          // If both document IDs are present and identical, mark both fields invalid and show a helpful message
          validateDocumentPair() {
            const ref = this.state.documents?.reference;
            const tpl = this.state.documents?.template;

            // Clear any previous pair-level message first
            step2ErrorMessage.hidden = true;
            step2ErrorMessage.textContent = '';

            if (!ref || !tpl || !ref.raw || !tpl.raw) {
              // Not enough info to validate pair; clear field-level conflict states if any
              return false;
            }

            const normRef = this.normaliseForComparison(ref.raw);
            const normTpl = this.normaliseForComparison(tpl.raw);

            if (normRef && normTpl && normRef === normTpl) {
              const msg = 'Reference and template documents must be different.';
              // mark both fields invalid with conflict messaging (no per-field text)
              this.setFieldConflictState('reference', msg);
              this.setFieldConflictState('template', msg);

              step2ErrorMessage.classList.remove('danger');
              step2ErrorMessage.classList.add('danger');
              step2ErrorMessage.hidden = false;
              step2ErrorMessage.textContent = msg;

              return true;
            }

            // If we reach here they are different; ensure fields show their individual valid/invalid state
            // Re-run per-field validation to restore green states if applicable
            this.setFieldValidState('reference', ref.inferredType !== 'unknown', ref.inferredType);
            this.setFieldValidState('template', tpl.inferredType !== 'unknown', tpl.inferredType);
            return false;
          },

          setFieldConflictState(fieldKey, message) {
            const fieldEl =
              fieldKey === 'reference' ? referenceInput.parentElement : templateInput.parentElement;
            const iconEl = fieldKey === 'reference' ? referenceIcon : templateIcon;
            const feedbackEl = fieldKey === 'reference' ? referenceFeedback : templateFeedback;
            const labelEl = fieldEl.querySelector('label');

            // Remove any success styling
            fieldEl.classList.remove('green-border', 'field-success');
            iconEl.classList.remove('green-text');
            if (labelEl) labelEl.classList.remove('green-text');

            // Show error state (icon + invalid styling) but do not display a per-field text message; use the step-level message instead
            fieldEl.classList.add('invalid');
            feedbackEl.hidden = true; // keep per-field feedback hidden to avoid duplication
            iconEl.textContent = 'close';
            iconEl.className = 'error-text';
          },

          // Now called with (fieldKey, isValid, inferredType)
          setFieldValidState(fieldKey, isValid, inferredType) {
            const fieldEl =
              fieldKey === 'reference' ? referenceInput.parentElement : templateInput.parentElement;
            const iconEl = fieldKey === 'reference' ? referenceIcon : templateIcon;
            const feedbackEl = fieldKey === 'reference' ? referenceFeedback : templateFeedback;
            const labelEl = fieldEl.querySelector('label');

            // clear previous states
            fieldEl.classList.remove('invalid', 'green-border', 'field-success');
            iconEl.classList.remove('green-text');
            if (labelEl) labelEl.classList.remove('green-text');
            feedbackEl.hidden = true;
            iconEl.className = '';
            iconEl.textContent = '';

            if (!isValid) {
              // No recognised doc type – mark visually invalid but avoid a per-field message to reduce noise for users.
              fieldEl.classList.add('invalid');
              feedbackEl.hidden = true;
              iconEl.textContent = 'close';
              // use BeerCSS error utility for icon colour
              iconEl.className = 'error-text';
              return;
            }

            // Valid type - set icon according to inferred type
            if (inferredType === 'SLIDES') {
              iconEl.textContent = 'slideshow';
            } else if (inferredType === 'SHEETS') {
              iconEl.textContent = 'grid_on';
            } else if (inferredType === 'DOCS') {
              iconEl.textContent = 'description';
            } else {
              iconEl.textContent = 'help';
            }

            // Indicate success using composite helper class
            fieldEl.classList.add('field-success');
          },

          hasValidDocumentInputs() {
            const ref = this.state.documents?.reference;
            const tpl = this.state.documents?.template;
            if (!ref || !tpl) return false;
            if (!ref.raw || !tpl.raw) return false;
            if (ref.inferredType === 'unknown' || tpl.inferredType === 'unknown') return false;

            const normRef = this.normaliseForComparison(ref.raw);
            const normTpl = this.normaliseForComparison(tpl.raw);
            if (!normRef || !normTpl) return false;
            if (normRef === normTpl) return false;
            return true;
          },

          submitCreateDefinition() {
            // pre-validated on client, hand off to server to validate & persist
            const ref = this.state.documents.reference;
            const tpl = this.state.documents.template;
            if (!ref || !tpl || !ref.raw || !tpl.raw) {
              step2ErrorMessage.textContent = 'Both document URLs are required.';
              step2ErrorMessage.hidden = false;
              return;
            }

            this.state.isStarting = true;
            this.updateStartButtonState();
            this.setSpinnerVisible(true);

            google.script.run
              .withSuccessHandler((processId) => {
                google.script.run.showProgressModal();
                google.script.host.close();
              })
              .withFailureHandler((error) => {
                this.state.isStarting = false;
                this.updateStartButtonState();
                this.setSpinnerVisible(false);
                step2ErrorMessage.textContent = error?.message
                  ? `Failed to start: ${error.message}`
                  : 'Failed to start assessment.';
                step2ErrorMessage.hidden = false;
              })
              .saveStartAndShowProgress(
                this.state.selectedAssignmentName,
                {
                  referenceDocumentId: ref.raw,
                  templateDocumentId: tpl.raw,
                },
                this.state.selectedAssignmentId
              );
          },

          handleCancel() {
            google.script.host.close();
          },
          setSpinnerVisible(visible) {
            spinner.hidden = !visible;
            spinner.setAttribute('aria-hidden', visible ? 'false' : 'true');
          },
          setControlsEnabled(enabled) {
            assignmentInput.disabled = !enabled;
            this.updateStartButtonState();
          },
          hasMatchedDefinitionWithDocs() {
            const def = this.state.matchedDefinition;
            return !!(def && def.referenceDocumentId && def.templateDocumentId);
          },
          updateStartButtonState() {
            if (this.state.step === 'enterDocuments') {
              if (this.state.documentsValidated) {
                startButton.disabled = !!this.state.isStarting;
              } else {
                startButton.disabled = !this.hasValidDocumentInputs() || this.state.isStarting;
              }
              return;
            }

            const hasDocs = this.hasMatchedDefinitionWithDocs();
            startButton.disabled = !hasDocs || this.state.isStarting;
          },
          showError(message) {
            errorMessage.textContent = message;
            errorMessage.hidden = false;
          },
          hideError() {
            errorMessage.hidden = true;
            errorMessage.textContent = '';
          },
        };

        globalThis.assignmentWizard = assignmentWizard;

        const kickOff = () => assignmentWizard.init();
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', kickOff);
        } else {
          kickOff();
        }
      })();
    </script>
  </body>
</html>
