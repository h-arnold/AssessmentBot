<!--
  Stepper.html – BeerCSS stepper partial for wizard modals
  Usage:
    <?!= include('UI/partials/Stepper', { steps: [...], currentStep: 1 }) ?>
  Params:
    steps: Array of { label: string }
    currentStep: number (0-based index)
-->
<nav class="wizard-stepper" data-wizard-stepper="true" aria-label="Wizard steps">
  <ol class="horizontal center-align" style="list-style: none; padding: 0; margin: 0;">
    <? for (var i = 0; i < steps.length; i++) { var step = steps[i]; ?>
      <li style="display: inline-block; margin: 0 1.5rem 0 0; vertical-align: middle;">
        <? if (i === currentStep) { ?>
          <span class="circle small primary" aria-current="step" data-step-index="<?= i ?>">
            <?= i + 1 ?>
          </span>
        <? } else if (i < currentStep) { ?>
          <span class="circle small muted" data-step-index="<?= i ?>">
            <?= i + 1 ?>
          </span>
        <? } else { ?>
          <span class="circle small" aria-disabled="true" data-step-index="<?= i ?>">
            <?= i + 1 ?>
          </span>
        <? } ?>
        <div class="small-margin" style="text-align: center; font-size: 0.95em; margin-top: 0.25rem;">
          <?= step.label ?>
        </div>
      </li>
      <? if (i < steps.length - 1) { ?>
        <li style="display: inline-block; vertical-align: middle; margin: 0 0.5rem;">
          <span class="divider" style="display: inline-block; width: 2.5rem; height: 2px; background: var(--outline-variant, #ccc); vertical-align: middle;"></span>
        </li>
      <? } ?>
    <? } ?>
  </ol>
</nav>
